<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ustawienia czatu — AiComp</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { -webkit-user-select: text; }
        input, textarea, select { font-size: 16px; }
    </style>
</head>
<body class="subpage-body">

<div id="toast-container"></div>

<div class="subpage-layout">

    <header class="subpage-header">
        <button class="back-btn" onclick="goBack()">&#8592; Powrót</button>
        <h1 class="subpage-title">Ustawienia czatu</h1>
        <button class="btn-primary" onclick="saveSettings()">Zapisz</button>
        <button class="btn-secondary" onclick="openPromptSettings()">Prompty</button>
    </header>

    <div class="cs-outer-tabs" role="tablist">
        <button class="cs-outer-tab active" data-tab="general" onclick="switchTab(this,'general')">&#9881;&#65039; Ogólne</button>
        <button class="cs-outer-tab"        data-tab="mistral" onclick="switchTab(this,'mistral')">&#9889; Mistral</button>
    </div>

    <div class="subpage-content cs-content">

        <div class="cs-outer-panel active" id="cs-panel-general">

            <div class="cs-section-header">&#128172; Chat</div>
            <div class="setting-group">
                <div class="cs-two-col">
                    <div>
                        <label for="g-chat-temp">Temperature: <span id="g-chat-temp-val">0.7</span></label>
                        <input type="range" id="g-chat-temp" class="slider" min="0" max="2" step="0.05" value="0.7"
                               oninput="document.getElementById('g-chat-temp-val').textContent = (+this.value).toFixed(2)">
                    </div>
                </div>
                <div class="cs-two-col" style="margin-top:12px">
                    <div>
                        <label for="g-chat-max-tokens">Max Output Tokens</label>
                        <input type="number" id="g-chat-max-tokens" class="setting-input" value="8192" min="256" max="65536" step="256">
                    </div>
                    <div>
                        <label for="g-chat-ctx">Context Tokens (historia)</label>
                        <input type="number" id="g-chat-ctx" class="setting-input" value="8000" min="1000" max="1000000" step="1000">
                    </div>
                </div>
            </div>

            <div class="cs-section-header">&#129504; Memory</div>
            <div class="setting-group">
                <label for="g-memory-temp">Temperature: <span id="g-memory-temp-val">0.1</span></label>
                <input type="range" id="g-memory-temp" class="slider" min="0" max="1" step="0.05" value="0.1"
                       oninput="document.getElementById('g-memory-temp-val').textContent = (+this.value).toFixed(2)">
                <div style="margin-top:12px">
                    <label for="g-memory-max-tokens">Max Output Tokens</label>
                    <input type="number" id="g-memory-max-tokens" class="setting-input" value="8192" min="512" max="65536" step="512">
                </div>
            </div>

            <div class="cs-section-header">&#128203; Summary</div>
            <div class="setting-group">
                <div class="cs-two-col">
                    <div>
                        <label for="g-summary-temp">Temperature: <span id="g-summary-temp-val">0.3</span></label>
                        <input type="range" id="g-summary-temp" class="slider" min="0" max="1" step="0.05" value="0.3"
                               oninput="document.getElementById('g-summary-temp-val').textContent = (+this.value).toFixed(2)">
                    </div>
                    <div>
                        <label for="g-summary-every">Auto-summary co ile odpowiedzi</label>
                        <input type="number" id="g-summary-every" class="setting-input" value="10" min="1" max="200" step="1">
                    </div>
                </div>
                <div style="margin-top:12px">
                    <label for="g-summary-max-tokens">Max Output Tokens</label>
                    <input type="number" id="g-summary-max-tokens" class="setting-input" value="8192" min="512" max="65536" step="512">
                </div>
            </div>

            <div class="cs-section-header">&#127760; Język komunikacji</div>
            <div class="setting-group">
                <label for="g-chat-lang">Język czatu</label>
                <select id="g-chat-lang" class="setting-input">
                    <option value="pl">&#127477;&#127473; Polski</option>
                    <option value="en">&#127468;&#127463; English</option>
                </select>
            </div>

        </div>

        <div class="cs-outer-panel" id="cs-panel-mistral">

            <div class="cs-inner-tabs" role="tablist">
                <button class="cs-inner-tab active" data-inner="mistral-general" onclick="switchInnerTab(this,'mistral-general')">Ogólne</button>
                <button class="cs-inner-tab"        data-inner="mistral-chat"    onclick="switchInnerTab(this,'mistral-chat')">Chat</button>
                <button class="cs-inner-tab"        data-inner="mistral-memory"  onclick="switchInnerTab(this,'mistral-memory')">Memory</button>
                <button class="cs-inner-tab"        data-inner="mistral-summary" onclick="switchInnerTab(this,'mistral-summary')">Summary</button>
                <button class="cs-inner-tab" data-inner="mistral-goals" onclick="switchInnerTab(this,'mistral-goals')">Goals</button>
                <button class="cs-inner-tab" data-inner="mistral-emotion" onclick="switchInnerTab(this,'mistral-emotion')">Emotion</button>
                <button class="cs-inner-tab" data-inner="mistral-relationship" onclick="switchInnerTab(this,'mistral-relationship')">Relationship</button>
                <button class="cs-inner-tab"        data-inner="mistral-embed"   onclick="switchInnerTab(this,'mistral-embed')">Embeddings</button>
            </div>

            <div class="cs-inner-panel active" id="cs-inner-mistral-general">
                <div class="setting-group">
                    <label>Klucze API Mistral (tego czatu)</label>
                    <div id="g-mistral-api-keys-list" class="api-keys-list"></div>
                    <div class="api-key-form">
                        <input type="text"     id="g-new-mistral-key-label" class="setting-input" placeholder="Etykieta (np. Konto 1)">
                        <input type="password" id="g-new-mistral-key-value" class="setting-input" placeholder="Wklej klucz API Mistral...">
                        <button class="btn-secondary" onclick="addMistralApiKey()">Dodaj</button>
                    </div>
                    <button class="btn-secondary small" onclick="syncMistralApiKeysFromGlobal()" style="margin-top:8px">
                        &#8595; Kopiuj z globalnych
                    </button>
                    <small style="display:block;margin-top:6px;color:var(--text-secondary)">
                        Uzyskaj klucz na <a href="https://console.mistral.ai" target="_blank">console.mistral.ai</a>.
                    </small>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-chat">
                <div class="setting-group">
                    <label for="g-mistral-chat-model">Model Mistral dla czatu</label>
                    <select id="g-mistral-chat-model" class="setting-input"></select>
                    <div class="field-hint-row">
                        <span>lub podaj własny ID modelu:</span>
                        <input type="text" id="g-mistral-chat-model-custom" class="setting-input" placeholder="mistral-large-latest"
                               oninput="syncCustomModel(this,'g-mistral-chat-model')">
                    </div>
                </div>
                <div class="setting-group">
                    <label for="g-mistral-chat-model-fallback">Fallback model</label>
                    <select id="g-mistral-chat-model-fallback" class="setting-input"></select>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-memory">
                <div class="setting-group">
                    <label for="g-mistral-memory-model">Model Mistral dla memory</label>
                    <select id="g-mistral-memory-model" class="setting-input"></select>
                    <div class="field-hint-row">
                        <span>lub podaj własny ID:</span>
                        <input type="text" id="g-mistral-memory-model-custom" class="setting-input" placeholder="mistral-small-latest"
                               oninput="syncCustomModel(this,'g-mistral-memory-model')">
                    </div>
                </div>
                <div class="setting-group">
                    <label for="g-mistral-memory-model-fallback">Fallback model</label>
                    <select id="g-mistral-memory-model-fallback" class="setting-input"></select>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-summary">
                <div class="setting-group">
                    <label for="g-mistral-summary-model">Model Mistral dla summary</label>
                    <select id="g-mistral-summary-model" class="setting-input"></select>
                    <div class="field-hint-row">
                        <span>lub podaj własny ID:</span>
                        <input type="text" id="g-mistral-summary-model-custom" class="setting-input" placeholder="mistral-small-latest"
                               oninput="syncCustomModel(this,'g-mistral-summary-model')">
                    </div>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-goals">
                <div class="setting-group">
                    <label for="g-mistral-goals-model">Model dla Goals</label>
                    <select id="g-mistral-goals-model" class="setting-input"></select>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-emotion">
                <div class="setting-group">
                    <label for="g-mistral-emotion-model">Model dla Emotion</label>
                    <select id="g-mistral-emotion-model" class="setting-input"></select>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-relationship">
                <div class="setting-group">
                    <label><input type="checkbox" id="g-relationship-use-llm"> Użyj LLM dla relacji (domyślnie: deterministycznie)</label>
                    <label for="g-mistral-relationship-model">Model dla Relationship</label>
                    <select id="g-mistral-relationship-model" class="setting-input"></select>
                </div>
            </div>

            <div class="cs-inner-panel" id="cs-inner-mistral-embed">
                <div class="setting-group">
                    <label for="g-mistral-embed-model">Model Mistral dla embeddings</label>
                    <select id="g-mistral-embed-model" class="setting-input"></select>
                    <div class="field-hint-row">
                        <span>lub podaj własny ID:</span>
                        <input type="text" id="g-mistral-embed-model-custom" class="setting-input" placeholder="mistral-embed"
                               oninput="syncCustomModel(this,'g-mistral-embed-model')">
                    </div>
                </div>
            </div>

        </div>

    </div>

    <footer class="subpage-footer">
        <button class="btn-secondary" onclick="goBack()">Anuluj</button>
        <button class="btn-primary"   onclick="saveSettings()">Zapisz ustawienia</button>
    </footer>

</div>

<script type="module" src="scripts/chat-settings-page.js"></script>
</body>
</html>
